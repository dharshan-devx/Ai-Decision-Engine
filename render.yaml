services:
  - type: web
    name: decision-engine-api
    env: python
    region: ohio # You can change this to your preferred region (e.g. oregon, frankfurt)
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.x
      # Add your GEMINI_API_KEY environment variable securely in the Render dashboard,
      # DO NOT put the real key here!
      # - key: GEMINI_API_KEY
      #   sync: false
