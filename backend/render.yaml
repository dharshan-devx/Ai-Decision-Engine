services:
  - type: web
    name: decision-engine-backend
    runtime: python
    buildCommand: "export PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/playwright-browsers && pip install -r requirements.txt && playwright install chromium --with-deps"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/src/playwright-browsers"
